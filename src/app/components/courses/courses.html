<div class="row justify-content-center g-4">
  @for (course of filteredCourses(); track course.id) {

    <div class="col-auto">
      <div class="card course-card h-100 border-0 shadow-sm transition-hover"
           [ngClass]="{'text-danger border border-danger': course.seats === 0}">

        <div class="position-relative">
          <img [src]="course.image" [alt]="course.title" class="card-img-top course-img"/>

          <div class="position-absolute top-0 end-0 m-3">
            @if (course.seats === 0) {
              <span class="badge bg-danger px-3 py-2 rounded-pill shadow">Course Full</span>
            }
            @else if (course.seats <= 2) {
              <span class="badge bg-warning text-dark px-3 py-2 rounded-pill shadow">Almost Full</span>
            }
          </div>
        </div>

        <div class="card-body p-4" [ngClass]="{'bg-warning-subtle': course.seats > 0 && course.seats <= 2}">
          
          <div class="mb-2">
            <h5 class="card-title fw-bold mb-1">{{ course.title }}</h5>
            <p class="text-muted small mb-2">By {{ course.instructor }}</p>

            <div class="d-flex align-items-center gap-2">
              <span class="text-danger text-decoration-line-through">50%</span>
              <span class="text-primary fw-bold">
                ${{ course.price }}
              </span>
            </div>
          </div>

          <div class="d-flex align-items-center mb-4 text-secondary small">
            <i class="bi bi-people me-2"></i>
            <span>{{ course.seats }} Seats Available</span>
          </div>

          <button class="btn btn-primary w-100 rounded-pill py-2 fw-bold shadow-sm"
                  appDisableAfterClick
                  (click)="register(course)"
                  [disabled]="course.seats === 0">
            {{ course.seats === 0 ? 'Full' : 'Register Now' }}
          </button>

          <button class="btn btn-link w-100 mt-2"
                  [routerLink]="['/courses', course.id]">
            View Details
          </button> 

        </div>

      </div>
    </div>

  }
</div>
